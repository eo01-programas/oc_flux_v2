<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargar Girados</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <link rel="stylesheet" href="css/pages/cargar-giros.css">
</head>
<body>

<div class="container">
    <button id="btnVolver" onclick="window.location.href='index.html'">Volver</button>
    <h1>Cargar girados al programa</h1>
    <p>Selecciona el archivo excel a cargar</p>
    
    <div class="upload-area">
        <input type="file" id="fileInput" accept=".xls,.xlsx,.csv" />
        <br>
        <button id="btnProcesar" onclick="procesarExcel()">Cargar Datos</button>
    </div>

    <div id="status"></div>
</div>

<!-- Botón naranja Buscar (esquina inferior izquierda) -->
<button id="btnBuscar" onclick="abrirModalBuscar()">Buscar</button>

<!-- Modal de búsqueda -->
<div id="modalBuscar" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Buscar y Editar Registros</h2>
            <button class="modal-close" onclick="cerrarModalBuscar()">&times;</button>
        </div>
        
        <div class="search-area">
            <div class="search-left">
                <div class="form-group">
                    <label for="inputBuscarOP">OP</label>
                    <input type="text" id="inputBuscarOP" placeholder="Buscar por OP..." onkeypress="handleEnterOP(event)">
                </div>
                <div class="form-group">
                    <label for="inputBuscarCorte">CORTE</label>
                    <input type="text" id="inputBuscarCorte" placeholder="Buscar por CORTE..." onkeypress="handleEnterCorte(event)">
                </div>
            </div>
            <div class="search-right">
                <button onclick="buscarRegistros()">Buscar</button>
            </div>
        </div>
        
        <div id="resultadosBusqueda">
            <p class="no-results">Ingresa un OP o CORTE para buscar registros.</p>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils/text.js"></script>
<script src="js/api/appscript.js"></script>
<script src="js/api/programa-service.js"></script>
<script src="js/pages/cargar-giros.js"></script>

</body>
</html>
